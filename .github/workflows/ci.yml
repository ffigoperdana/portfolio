name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repo (build + checks).
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Format check
        run: npx prettier --check .

      - name: Types & templates
        run: npm run check

      - name: Build
        run: npm run build

      # Internal links only — external hosts (LinkedIn, GitHub, live apps)
      # rate-limit CI runners and would make the pipeline flaky.
      # Pinned version so CI never fetch-and-executes a floating latest.
      - name: Internal link check
        run: npx --yes linkinator@6.1.2 ./dist --recurse --skip "^https?://"

      - name: Docker build smoke test
        run: docker build -t portfolio-smoke .
