name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Format check
        run: npx prettier --check .

      - name: Types & templates
        run: npm run check

      - name: Build
        run: npm run build

      # Internal links only — external hosts (LinkedIn, GitHub, live apps)
      # rate-limit CI runners and would make the pipeline flaky.
      - name: Internal link check
        run: npx linkinator ./dist --recurse --skip "^https?://"

      - name: Docker build smoke test
        run: docker build -t portfolio-smoke .
