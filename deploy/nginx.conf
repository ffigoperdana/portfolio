# nginx config for the portfolio container (Coolify → SafeLine → WireGuard →
# Caddy on the VPS terminates TLS; this serves plain HTTP on :80).
# Security headers mirror public/_headers (that file only applies on
# Cloudflare/Netlify Pages — here nginx is the source of truth).

# frame-ancestors 'self': the resume dialog/pages embed our own PDFs in an
# iframe — 'none' blocked them. cloudflareinsights: CF Web Analytics beacon.
map $sent_http_content_type $portfolio_csp {
    default "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://cloudflareinsights.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers on every response
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy $portfolio_csp always;

    # Hashed build assets: cache forever
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Security-Policy $portfolio_csp always;
    }

    # PDFs & static goodies: cache a day, revalidate
    location ~* \.(pdf|png|svg|ico|txt|xml)$ {
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Security-Policy $portfolio_csp always;
    }

    # HTML: short cache so deploys propagate fast through Cloudflare
    location / {
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy $portfolio_csp always;
        try_files $uri $uri/index.html =404;
    }

    error_page 404 /404.html;

    gzip on;
    # text/html is gzipped by default — listing it triggers a startup warning
    gzip_types text/css application/javascript image/svg+xml application/json text/plain;
    gzip_min_length 512;
}
