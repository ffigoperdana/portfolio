# nginx config for the portfolio container (Coolify → SafeLine → WireGuard →
# Caddy on the VPS terminates TLS; this serves plain HTTP on :80).
# nginx.conf is the source of truth for security headers on this stack.
#
# frame-ancestors 'self': the resume dialog/pages embed our own PDFs in an
# iframe. cloudflareinsights: CF Web Analytics beacon.

server_tokens off; # no nginx version in Server header / error pages

map $sent_http_content_type $portfolio_csp {
    default "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://cloudflareinsights.com; object-src 'self'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---------------------------------------------------
    # NOTE: nginx resets inherited add_header the moment a nested `location`
    # declares its own, so the FULL set is repeated in every location below.
    # HSTS has no includeSubDomains (this host serves only the apex; other
    # fgdev.tech subdomains manage their own TLS). Strengthen at the CF edge.
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy $portfolio_csp always;

    # Inert leftover from the Cloudflare-Pages era — never served.
    location = /_headers {
        return 404;
    }

    # Hashed build assets: cache forever
    location /_astro/ {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Content-Security-Policy $portfolio_csp always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # PDFs & static goodies: cache a day
    location ~* \.(pdf|png|webp|svg|ico|txt|xml)$ {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Content-Security-Policy $portfolio_csp always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # HTML: short cache so deploys propagate fast through Cloudflare
    location / {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Content-Security-Policy $portfolio_csp always;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri $uri/index.html =404;
    }

    error_page 404 /404.html;

    gzip on;
    # text/html is gzipped by default — listing it triggers a startup warning
    gzip_types text/css application/javascript image/svg+xml application/json text/plain;
    gzip_min_length 512;
}
